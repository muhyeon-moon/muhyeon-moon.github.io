        .content-container {
            padding: 20px;

        .content-container h1 {
            margin-bottom: 25px;
            font-size: 1.8em;
            color: #333;
            width: 100%;
            float: left;
        }
        .recipe-card {
            float: left;
            width: 100%;              
            margin-bottom: 20px;
            background-color: #ffffff;   
            border: 1px solid #bcbcbc;    
            border-radius: 8px;             
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); 
            overflow: hidden;         
        }
        .recipe-card a {
            color: #000;
            text-decoration: none;
            display: block;
        }
        .recipe-card img {
            width: 100%;
            height: 220px;            
            object-fit: cover;        
            display: block;
        }
        .recipe-info {
            padding: 15px;
            text-align: left;
        }
        .recipe-info h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.25em;
            color: #333;
            border-bottom: 2px solid #e3f1e0;
            padding-bottom: 5px;
        }
        .recipe-info ul li {
            font-size: 0.9em;
            line-height: 160%;
            color: #666;
        }
        @media only screen and (min-width: 600px) {
            .recipe-card {
                width: 47%;           
                margin: 0 1.5% 25px 1.5%; 
            }
        }
        footer{
            height: 60px;
            padding: 20px;
